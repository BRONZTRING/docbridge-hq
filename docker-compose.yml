services:
  db:
    # 直接使用带有 pgvector 插件的官方 PostgreSQL 15 镜像
    image: pgvector/pgvector:pg15
    container_name: docbridge_db
    restart: always
    environment:
      # 数据库的超级管理员账号与密码（本地开发环境）
      POSTGRES_USER: docbridge_admin
      POSTGRES_PASSWORD: docbridge_password
      POSTGRES_DB: docbridge_db
    ports:
      # 【关键修改】将虚拟机的 5433 端口映射到容器的 5432 端口，避开冲突
      - "5433:5432"
    volumes:
      # 将数据持久化到本地，防止容器重启后数据丢失
      - docbridge_pgdata:/var/lib/postgresql/data

volumes:
  # 声明数据卷
  docbridge_pgdata: